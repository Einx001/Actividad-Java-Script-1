<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Dólares a Pesos Colombianos</title>
</head>
<body>

    <h2>Conversor USD → COP</h2>

    <form id="formulario">
        <label for="dolares">Dólares:</label>
        <input type="number" id="dolares" step="0.01" required>

        <button type="submit">Convertir</button>
    </form>

    <h3 id="resultado"></h3>

    <script src="script.js"></script>
</body>
</html>
